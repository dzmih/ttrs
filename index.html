<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#111111" />
    <title>Tetris Mini App</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: var(--tg-theme-bg-color, #0f1115);
        --text: var(--tg-theme-text-color, #eef2ff);
        --hint: var(--tg-theme-hint-color, #8e98aa);
        --button: var(--tg-theme-secondary-bg-color, #1b2130);
        --button-text: var(--tg-theme-text-color, #eef2ff);
        --accent: var(--tg-theme-button-color, #4ea4ff);
        --accent-text: var(--tg-theme-button-text-color, #ffffff);
        --panel: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.1);
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background:
          radial-gradient(
            circle at top,
            rgba(78, 164, 255, 0.16),
            transparent 30%
          ),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 40%),
          var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
      }
      .app {
        width: min(100%, 520px);
        display: grid;
        gap: 12px;
      }

      .topbar {
        justify-content: space-between;
        align-items: end;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .title {
        margin: 0;
        font-size: clamp(20px, 5vw, 28px);
        line-height: 1;
        letter-spacing: 0.02em;
      }

      .stats {
        text-align: right;
        display: grid;
        gap: 4px;
        font-size: 14px;
        color: var(--hint);
      }

      .stats strong {
        color: var(--text);
        font-size: 18px;
      }

      .board-shell {
        position: relative;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.2);
        touch-action: none;
      }

      .overlay {
        position: absolute;
        inset: 12px;
        display: none;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.68);
        backdrop-filter: blur(6px);
      }

      .overlay.visible {
        display: flex;
      }

      .overlay-card {
        width: min(92%, 300px);
        padding: 20px;
        border-radius: 18px;
        background: rgba(17, 20, 26, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-align: center;
      }

      .overlay-card h2 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      .overlay-card p {
        margin: 0 0 16px;
        color: var(--hint);
      }

      .restart {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 14px 16px;
        background: var(--accent);
        color: var(--accent-text);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 10px;
      }

      .control-btn {
        min-height: 60px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--button);
        color: var(--button-text);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        touch-action: manipulation;
        outline: none;
        -webkit-user-drag: none;
        user-drag: none;
      }

      .control-btn * {
        -webkit-user-drag: none;
        user-drag: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        pointer-events: none; /* let the button receive the events, not the icon */
      }

      .control-btn img {
        width: 1.1em;
        height: 1.1em;
        display: inline-block;
        vertical-align: middle;
        object-fit: contain;
        filter: invert(1) hue-rotate(180deg) saturate(0); /* neutralize if needed; kept for dark theme fallback */
      }

      .control-btn.primary {
        background: linear-gradient(
          180deg,
          rgba(78, 164, 255, 0.24),
          rgba(78, 164, 255, 0.14)
        );
        border-color: rgba(78, 164, 255, 0.35);
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: var(--hint);
        line-height: 1.4;
        padding-bottom: env(safe-area-inset-bottom);
      }

      @media (max-width: 380px) {
        body {
          padding: 8px;
        }

        .topbar {
          padding: 12px 14px;
        }

        .controls {
          gap: 8px;
        }

        .control-btn {
          min-height: 56px;
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <h1 class="title">Tetris</h1>
          <div style="font-size: 13px; color: var(--hint); margin-top: 4px">
            Telegram Mini App
          </div>
        </div>
        <div class="stats">
          <div>Очки</div>
          <strong id="score">0</strong>
        </div>
      </section>

      <section class="board-shell">
        <canvas
          id="game"
          width="300"
          height="600"
          aria-label="Поле игры Тетрис"
        ></canvas>

        <div class="overlay" id="gameOverOverlay" aria-hidden="true">
          <div class="overlay-card">
            <h2>Game Over</h2>
            <p>Фигуры дошли до верхней границы поля.</p>
            <button class="restart" id="restartBtn">Начать заново</button>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="Управление игрой">
        <button
          class="control-btn"
          id="leftBtn"
          aria-label="Влево"
          draggable="false"
        >
          <img
            src="src/icons/arrow_left.svg"
            alt=""
            draggable="false"
            aria-hidden="true"
          />
        </button>
        <button
          class="control-btn"
          id="rotateBtn"
          aria-label="Повернуть"
          draggable="false"
        >
          <img
            src="src/icons/change.svg"
            alt=""
            draggable="false"
            aria-hidden="true"
          />
        </button>
        <button
          class="control-btn primary"
          id="downBtn"
          aria-label="Вниз"
          draggable="false"
        >
          <img
            src="src/icons/arrow_down.svg"
            alt=""
            draggable="false"
            aria-hidden="true"
          />
        </button>
        <button
          class="control-btn"
          id="rightBtn"
          aria-label="Вправо"
          draggable="false"
        >
          <img
            src="src/icons/arrow_right.svg"
            alt=""
            draggable="false"
            aria-hidden="true"
          />
        </button>
      </section>

      <div class="footer">
        Свайп влево/вправо - движение, вниз - ускорение, свайп вверх - поворот
      </div>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="game.js"></script>
  </body>
</html>
